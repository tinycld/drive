name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: npm
      - uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - run: npm ci
      - run: npm run addons:generate
      - name: Generate PB schema types
        run: |
          cd server && go build -o tinycld .
          ./tinycld --dev serve &
          sleep 3
          kill %1 2>/dev/null || true
      - run: npm run checks

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: npm
      - uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - run: npm ci
      - run: npm run addons:generate
      - run: cd server && go build -o tinycld .
      - name: Server API smoke test
        run: |
          npx tsx scripts/reset-dev-db.ts --url http://127.0.0.1:7091 --data-dir server/pb_test_data
          server/tinycld --dev --dir server/pb_test_data --migrationsDir server/pb_migrations --http 127.0.0.1:7091 serve &
          sleep 3
          npx tsx scripts/test-server-api.ts --url http://127.0.0.1:7091 --email user@tinycld.org --password TestUser1234!
          kill %1 2>/dev/null || true
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
      - run: npx playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'
      - run: npx playwright test
        env:
          CI: true
      - uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
